<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <!-- Descrição para SEO — altere conforme a página -->

    <!-- Título que aparece na aba do navegador -->

    <!-- Ícone da aba — substitua pelo seu favicon -->

    <!-- Google Fonts — substitua pela fonte desejada -->

            <!-- Seção Hero — apresentação principal -->
            <section class="hero">

                <a href="#contato" class="btn">Saiba Mais</a>

            <section class="section">
